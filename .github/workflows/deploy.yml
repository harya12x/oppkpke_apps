name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            cd /var/www/oppkpke_apps

            echo "========================================"
            echo "🚀 Memulai proses deploy..."
            echo "========================================"

            # ----------------------------------------
            # STEP 1: Pull latest code
            # ----------------------------------------
            echo "📥 Pull latest code dari GitHub..."
            git pull origin main

            # ----------------------------------------
            # STEP 2: Cek perubahan dependency
            # ----------------------------------------
            COMPOSER_CHANGED=$(git diff HEAD@{1} HEAD -- composer.lock | wc -l)
            PACKAGE_CHANGED=$(git diff HEAD@{1} HEAD -- package-lock.json | wc -l)
            DOCKERFILE_CHANGED=$(git diff HEAD@{1} HEAD -- Dockerfile | wc -l)

            if [ "$COMPOSER_CHANGED" -gt 0 ] || [ "$PACKAGE_CHANGED" -gt 0 ] || [ "$DOCKERFILE_CHANGED" -gt 0 ]; then

              # ----------------------------------------
              # Kondisi A: Ada perubahan dependency
              # Build image baru, server tetap jalan
              # ----------------------------------------
              echo "🔨 Dependency berubah, build image baru..."
              echo "   (Server tetap jalan selama proses build)"
              docker compose build app

              echo "🗄️  Jalankan migrasi di container lama..."
              docker compose exec -T app php artisan migrate --force

              echo "⚡ Swap ke container baru (downtime < 1 detik)..."
              docker compose up -d --no-deps app

            else

              # ----------------------------------------
              # Kondisi B: Hanya update code biasa
              # Graceful reload, tanpa restart container
              # ----------------------------------------
              echo "⚡ Hanya update code, graceful reload..."

              echo "🗄️  Jalankan migrasi..."
              docker compose exec -T app php artisan migrate --force

              echo "♻️  Reload PHP-FPM (tanpa restart container)..."
              docker compose exec -T app kill -USR2 1

            fi

            # ----------------------------------------
            # STEP 3: Post-deploy artisan commands
            # ----------------------------------------
            echo "⏳ Tunggu container siap..."
            sleep 3

            echo "🔗 Buat storage symlink..."
            docker compose exec -T app php artisan storage:link

            echo "🧹 Clear & rebuild cache..."
            docker compose exec -T app php artisan config:clear
            docker compose exec -T app php artisan config:cache
            docker compose exec -T app php artisan route:clear
            docker compose exec -T app php artisan route:cache
            docker compose exec -T app php artisan view:clear
            docker compose exec -T app php artisan view:cache
            docker compose exec -T app php artisan optimize

            # ----------------------------------------
            # STEP 4: Verifikasi deploy berhasil
            # ----------------------------------------
            echo "🔍 Verifikasi container berjalan..."
            docker compose ps

            echo "========================================"
            echo "✅ Deploy selesai tanpa downtime!"
            echo "========================================"