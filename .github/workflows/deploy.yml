name: Deploy to VPS

on:
  push:
    branches:
      - main

# Serialisasi deploy: hanya satu deploy jalan pada satu waktu. Push baru
# tidak dibatalkan di tengah (cancel-in-progress: false) supaya build image +
# migrate + swap tidak terpotong; ia mengantre sampai deploy sebelumnya selesai.
concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Kalau SSH/docker build nyangkut, job dibunuh di 15 menit — runner dilepas,
    # tidak menggantung memakai slot runner berjam-jam (default 6 jam).
    timeout-minutes: 15

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            set -e
            cd /var/www/oppkpke_apps

            echo "========================================"
            echo "🚀 Memulai proses deploy..."
            echo "========================================"

            # ----------------------------------------
            # STEP 0: Izinkan git bekerja di direktori ini
            # ----------------------------------------
            git config --global --add safe.directory /var/www/oppkpke_apps

            # ----------------------------------------
            # STEP 1: Sinkronkan kode
            # ----------------------------------------
            echo "📥 Sinkronkan kode dari GitHub..."
            BEFORE=$(git rev-parse HEAD)
            git fetch origin main
            git reset --hard origin/main
            AFTER=$(git rev-parse HEAD)

            if [ "$BEFORE" = "$AFTER" ]; then
              echo "ℹ️  Tidak ada commit baru ($AFTER), lanjut rebuild cache saja."
            else
              echo "✅ Update: $BEFORE -> $AFTER"
            fi

            # ----------------------------------------
            # STEP 2: Build image baru & swap container
            # ----------------------------------------
            echo "🔨 Build image baru... (server lama tetap jalan selama build)"
            docker compose build app

            # ----------------------------------------
            # STEP 2b: Sinkronkan hasil build Vite ke host
            # ----------------------------------------
            echo "📦 Sinkronkan asset build (Vite) dari image ke host..."
            rm -rf public/build
            CID=$(docker create oppkpke_apps-app:latest)
            docker cp "$CID":/var/www/public/build ./public/build
            docker rm "$CID" > /dev/null

            echo "📣 Sinyal queue:restart supaya worker lama selesai job..."
            docker compose exec -T app php artisan queue:restart || true

            echo "⚡ Swap ke container baru (downtime < 1 detik)..."
            docker compose up -d --no-deps app worker

            # ----------------------------------------
            # STEP 3: Post-deploy artisan commands
            # ----------------------------------------
            echo "⏳ Tunggu container & network siap..."
            sleep 10

            echo "🧹 Refresh package manifest & bersihkan cache lama..."
            docker compose exec -T app php artisan optimize:clear

            # Migrasi akan tetap berjalan normal jika ada tabel/kolom baru.
            # Ditambahkan 'timeout 60s' agar tidak menggantung selamanya jika terjadi DB Lock.
            echo "🗄️  Jalankan migrasi database..."
            docker compose exec -T app timeout 60s php artisan migrate --force

            echo "🔗 Buat storage symlink..."
            docker compose exec -T app php artisan storage:link || true

            echo "📦 Daftarkan ulang package & bangun cache baru..."
            docker compose exec -T app php artisan package:discover --ansi
            docker compose exec -T app php artisan optimize

            # ----------------------------------------
            # STEP 3b: Pastikan storage & cache writable oleh www-data
            # ----------------------------------------
            echo "🔐 Perbaiki kepemilikan storage & bootstrap/cache..."
            docker compose exec -T app chown -R www-data:www-data storage bootstrap/cache
            docker compose exec -T app chmod -R 775 storage bootstrap/cache

            # ----------------------------------------
            # STEP 3c: Reload nginx
            # ----------------------------------------
            echo "🔁 Reload konfigurasi nginx..."
            docker compose exec -T nginx nginx -t && docker compose exec -T nginx nginx -s reload || true

            # ----------------------------------------
            # STEP 4: Verifikasi deploy berhasil
            # ----------------------------------------
            echo "🔍 Verifikasi container berjalan..."
            docker compose ps

            echo "========================================"
            echo "✅ Deploy selesai tanpa downtime!"
            echo "========================================"