name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script_stop: true
          script: |
            set -e
            set -x   # trace tiap perintah ke stderr (stderr streamed live, tidak hilang saat abort)
            cd /var/www/oppkpke_apps

            echo "========================================"
            echo "🚀 Memulai proses deploy..."
            echo "========================================"

            # ----------------------------------------
            # STEP 1: Sinkronkan kode (paksa sama dengan repo)
            # reset --hard mencegah deploy gagal gara-gara
            # perubahan lokal di server yang memblokir merge.
            # ----------------------------------------
            echo "📥 Sinkronkan kode dari GitHub..."
            BEFORE=$(git rev-parse HEAD)
            git fetch origin main
            git reset --hard origin/main
            AFTER=$(git rev-parse HEAD)

            if [ "$BEFORE" = "$AFTER" ]; then
              echo "ℹ️  Tidak ada commit baru ($AFTER), lanjut rebuild cache saja."
            else
              echo "✅ Update: $BEFORE -> $AFTER"
            fi

            # ----------------------------------------
            # STEP 2: Build image baru & swap container
            # Kode di-bake ke dalam image (app TIDAK mount kode host),
            # jadi perubahan kode HANYA muncul setelah rebuild + swap.
            # Layer caching bikin rebuild cepat kalau dependency tak berubah.
            # ----------------------------------------
            echo "🔨 Build image baru... (server lama tetap jalan selama build)"
            docker compose build app

            echo "🗄️  Jalankan migrasi (di container yang sedang jalan)..."
            docker compose exec -T app php artisan migrate --force

            echo "⚡ Swap ke container baru (downtime < 1 detik)..."
            docker compose up -d --no-deps app

            # ----------------------------------------
            # STEP 3: Post-deploy artisan commands
            # ----------------------------------------
            echo "⏳ Tunggu container siap..."
            sleep 3

            echo "🔗 Buat storage symlink..."
            docker compose exec -T app php artisan storage:link || true

            echo "🧹 Clear & rebuild cache..."
            docker compose exec -T app php artisan config:clear
            docker compose exec -T app php artisan config:cache
            docker compose exec -T app php artisan route:clear
            docker compose exec -T app php artisan route:cache
            docker compose exec -T app php artisan view:clear
            docker compose exec -T app php artisan view:cache
            docker compose exec -T app php artisan optimize

            # ----------------------------------------
            # STEP 4: Verifikasi deploy berhasil
            # ----------------------------------------
            echo "🔍 Verifikasi container berjalan..."
            docker compose ps

            echo "========================================"
            echo "✅ Deploy selesai tanpa downtime!"
            echo "========================================"