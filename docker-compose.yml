services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: oppkpke_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      # Jangan mount semua! Hanya storage & cache saja
      - storage_data:/var/www/storage
      - cache_data:/var/www/bootstrap/cache
    networks:
      - oppkpke_network
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: oppkpke_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: oppkpke_db
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - oppkpke_network

  nginx:
    image: nginx:alpine
    container_name: oppkpke_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - .:/var/www                    # nginx butuh akses file statis
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - oppkpke_network
    depends_on:
      - app

networks:
  oppkpke_network:
    driver: bridge

volumes:
  db_data:
  storage_data:
  cache_data: