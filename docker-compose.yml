services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: oppkpke_apps-app:latest
    container_name: oppkpke_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      # .env tidak di-bake ke image (lihat .dockerignore) — mount dari host
      # supaya APP_KEY & kredensial DB tersedia di setiap container baru.
      - ./.env:/var/www/.env:ro
      - storage_data:/var/www/storage
      - cache_data:/var/www/bootstrap/cache
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - oppkpke_network
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
    healthcheck:
      test: ["CMD", "php-fpm", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Queue worker — kode di-bake ke image yang sama dengan `app` (lihat `image:` di atas),
  # tidak perlu build terpisah. Pakai driver 'database' (tabel `jobs` yang sudah ada),
  # tidak perlu Redis untuk jumlah pengguna/job aplikasi ini. Proses tunggal
  # di-supervisi oleh restart:unless-stopped (tidak ada supervisord di image ini)
  # — --max-time bikin proses keluar bersih tiap jam supaya Docker me-restart-nya
  # (membatasi memory growth PHP jangka panjang).
  worker:
    image: oppkpke_apps-app:latest
    container_name: oppkpke_worker
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan queue:work database --queue=default --tries=3 --backoff=10,30,60 --max-time=3600 --sleep=3 --timeout=300
    volumes:
      - ./.env:/var/www/.env:ro
      - storage_data:/var/www/storage
      - cache_data:/var/www/bootstrap/cache
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - oppkpke_network
    environment:
      - APP_ENV=production
      - APP_DEBUG=false

  # Scheduler — menjalankan penjadwal Laravel (schedule:work) di foreground.
  # Menangani: announcements:deactivate-expired (tiap 10 mnt), audit:prune (harian),
  # queue:prune-failed (mingguan). Image sama dengan `app`, tidak perlu build ulang.
  # HANYA SATU instance (penjadwal tidak boleh digandakan). restart:unless-stopped
  # yang menjaganya tetap hidup — tidak butuh supervisord/cron di host.
  scheduler:
    image: oppkpke_apps-app:latest
    container_name: oppkpke_scheduler
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan schedule:work
    volumes:
      - ./.env:/var/www/.env:ro
      - storage_data:/var/www/storage
      - cache_data:/var/www/bootstrap/cache
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - oppkpke_network
    environment:
      - APP_ENV=production
      - APP_DEBUG=false

  nginx:
    image: nginx:alpine
    container_name: oppkpke_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - oppkpke_network
    depends_on:
      - app

networks:
  oppkpke_network:
    driver: bridge

volumes:
  storage_data:
  cache_data: