# Redirect HTTP ke HTTPS
server {
    listen 80;
    server_name rpkdkabkotabaru.id www.rpkdkabkotabaru.id;
    return 301 https://$host$request_uri;
}

# HTTPS Server
server {
    listen 443 ssl;
    server_name rpkdkabkotabaru.id www.rpkdkabkotabaru.id;
    root /var/www/public;
    index index.php index.html;

    # SSL Certificate
    ssl_certificate /etc/letsencrypt/live/rpkdkabkotabaru.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rpkdkabkotabaru.id/privkey.pem;

    # SSL Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";

    # Max upload size
    client_max_body_size 50M;

    # Laravel routing
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM
    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300;
    }

    # Block hidden files
    location ~ /\.ht {
        deny all;
    }

    # Cache static assets
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|ttf|svg)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Logs
    access_log /var/log/nginx/oppkpke_access.log;
    error_log /var/log/nginx/oppkpke_error.log;
}