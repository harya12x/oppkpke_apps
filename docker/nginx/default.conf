# Redirect HTTP ke HTTPS
server {
    listen 80;
    server_name rpkdkabkotabaru.id www.rpkdkabkotabaru.id;
    return 301 https://$host$request_uri;
}

# HTTPS Server
server {
    listen 443 ssl;
    server_name rpkdkabkotabaru.id www.rpkdkabkotabaru.id;
    root /var/www/public;
    index index.php index.html;

    # SSL Certificate
    ssl_certificate /etc/letsencrypt/live/rpkdkabkotabaru.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rpkdkabkotabaru.id/privkey.pem;

    # SSL Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Max upload size
    client_max_body_size 50M;

    # Docker internal DNS resolver (wajib untuk zero-downtime swap container)
    resolver 127.0.0.11 valid=30s;

    # Laravel routing
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM
    location ~ \.php$ {
        set $upstream app:9000;
        fastcgi_pass $upstream;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300;
        fastcgi_buffer_size 16k;
        fastcgi_buffers 4 16k;
        fastcgi_connect_timeout 60s;
        fastcgi_send_timeout 300s;
    }

    # Block hidden files
    location ~ /\.ht {
        deny all;
    }

    # Block .env access
    location ~ /\.env {
        deny all;
    }

    # Cache static assets
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|ttf|svg|webp)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # Logs
    access_log /var/log/nginx/oppkpke_access.log;
    error_log /var/log/nginx/oppkpke_error.log;
}